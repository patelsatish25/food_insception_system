<div class="dashboard-container">

  <app-sidebar></app-sidebar>

  <div class="main-content">

    <app-header></app-header>

   <div class="content-area">

<h2 style="color: aliceblue;">Past Inspection Reports</h2>

<div class="report-grid">

<mat-card class="report-card" *ngFor="let session of filteredSessions">

<div class="session-header">

<div>Session #{{session._id}}</div>

<span class="session-date">
{{session.date}}
</span>

</div>

<p><b>Total Foods:</b> {{session.bad+session.good}}</p>

<p><b>Food Name:</b> {{session.food}}</p>

<p>
<b>Duration:</b>
{{session.starttime}} - {{session.endtime}}
</p>

<button
mat-raised-button
color="primary"
(click)="toggleSession(session)"
>
View Full Analysis
</button>


<app-session-analysis
*ngIf="session.showAnalysis"
[session]="session">
</app-session-analysis>

</mat-card>

</div>

</div>

  </div>

</div>
