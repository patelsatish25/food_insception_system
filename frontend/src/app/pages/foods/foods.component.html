<div class="dashboard-container">

  <div class="sidebar">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-content">

    <app-header></app-header>

    <div class="content-area">

      <!-- Page Header -->
      <div class="page-header">
        <h2>Food Detection</h2>

        <div class="search-box">
          <mat-icon>search</mat-icon>
          <input matInput (keyup)="applyFilter($event)" placeholder="Search food...">
        </div>
      </div>

      <!-- Table Card -->
      <mat-card class="table-card">

        <table mat-table [dataSource]="dataSource" matSort class="modern-table">

          <!-- Food -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Food</th>
            <td mat-cell *matCellDef="let element">
              <div class="food-name">
                🍎 {{element.name}}
              </div>
            </td>
          </ng-container>

          <!-- Category -->
          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
            <td mat-cell *matCellDef="let element">
              <span class="category">{{element.category}}</span>
            </td>
          </ng-container>

          <!-- Good -->
          <ng-container matColumnDef="good">
            <th mat-header-cell *matHeaderCellDef>Good</th>
            <td mat-cell *matCellDef="let element">
              <span class="good-count">{{element.good}}</span>
            </td>
          </ng-container>

          <!-- Bad -->
          <ng-container matColumnDef="bad">
            <th mat-header-cell *matHeaderCellDef>Bad</th>
            <td mat-cell *matCellDef="let element">
              <span class="bad-count">{{element.bad}}</span>
            </td>
          </ng-container>

          <!-- Confidence -->
          <ng-container matColumnDef="confidence">
            <th mat-header-cell *matHeaderCellDef>Confidence</th>
            <td mat-cell *matCellDef="let element">
              {{element.confidence}}
            </td>
          </ng-container>

          <!-- Status -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let element">

              <span
                class="status"
                [ngClass]="element.bad > 0 ? 'risk' : 'good'">

                {{element.bad > 0 ? 'Risk' : 'Good'}}

              </span>

            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        </table>

        <mat-paginator [pageSize]="5"></mat-paginator>

      </mat-card>

    </div>

  </div>

</div>
