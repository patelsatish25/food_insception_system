<div class="dashboard-container">

  <!-- Sidebar -->
  <div class="sidebar">
    <app-sidebar></app-sidebar>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Header -->
    <app-header></app-header>

    <!-- Dashboard Content -->
    <div class="content-area">

      <!-- STAT CARDS -->
      <div class="row g-4">

        <div class="col-lg-3 col-md-6">
          <mat-card class="stat-card total">
            <div class="card-content">
              <div>
                <h6>Total Sessions</h6>
                <h2>{{stats.totalSessions}}</h2>
              </div>
              <div class="card-icon">📊</div>
            </div>
          </mat-card>
        </div>

        <div class="col-lg-3 col-md-6">
          <mat-card class="stat-card food">
            <div class="card-content">
              <div>
                <h6>Total Food</h6>
                <h2>{{stats.totalFood}}</h2>
              </div>
              <div class="card-icon">🍔</div>
            </div>
          </mat-card>
        </div>

        <div class="col-lg-3 col-md-6">
          <mat-card class="stat-card good">
            <div class="card-content">
              <div>
                <h6>Good Food</h6>
                <h2>{{stats.goodFood}}</h2>
              </div>
              <div class="card-icon">✅</div>
            </div>
          </mat-card>
        </div>

        <div class="col-lg-3 col-md-6">
          <mat-card class="stat-card bad">
            <div class="card-content">
              <div>
                <h6>Bad Food</h6>
                <h2>{{stats.badFood}}</h2>
              </div>
              <div class="card-icon">❌</div>
            </div>
          </mat-card>
        </div>

      </div>


      <!-- CHARTS -->
      <div class="row g-4 mt-3">

        <div class="col-lg-6">
          <mat-card class="chart-card">
            <h5>Good vs Bad Food</h5>
            <div id="pieChart" class="chart"></div>
          </mat-card>
        </div>

        <div class="col-lg-6">
          <mat-card class="chart-card">
            <h5>Food Category Distribution</h5>
            <div id="barChart" class="chart"></div>
          </mat-card>
        </div>

      </div>


      <!-- LINE CHART -->
      <div class="row g-4 mt-3">
        <div class="col-12">
          <mat-card class="chart-card">
            <h5>Food Detection Trend</h5>
            <div id="lineChart" class="chart"></div>
          </mat-card>
        </div>
      </div>

    </div>

  </div>

</div>
